{% extends "base.html" %}
{% block content %}
<style>
    .form_group {
        margin-top: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }

    input {
        width: 20%;
        padding: 8px;
        border: 1px solid#ccc;
        border-radius: 4px;
    }

    .error-msg {
        color: red;
        background: #f2dede;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 15px;
    }
</style>

{% if error %}
<div class="error-msg">{{ error }}</div>
{% endif %}

<form action="/login" method="POST">
    <div class="form-group">
        <label for="username">Username :</label>
        <input type="text" name="username" value="{{request.form.get('username','')}}" required>
    </div>
    <div class="form-group">
        <label for="password">Password :</label>
        <input type="password" name="password" required>
    </div>
    <button type="submit"
        style="background:green; color:white; border:none; padding:10px 20px; cursor:pointer; margin-top: 15px;">Login</button>
</form>
{% endblock %}
